<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Ropa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        .producto {
            display: inline-block;
            width: 30%;
            margin: 15px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        h2 {
            color: #333;
        }
        .precio {
            font-size: 1.2em;
            color: #e60000;
        }
    </style>
</head>
<body>
    <h1>Bienvenido a Nuestra Tienda de Ropa</h1>
    <div class="container">
        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Camiseta">
            <h2>Camiseta Casual</h2>
            <p>Cómoda y perfecta para cualquier ocasión.</p>
            <p class="precio">$15.99</p>
        </div>
        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Pantalón">
            <h2>Pantalón Deportivo</h2>
            <p>Ideal para entrenamientos o uso diario.</p>
            <p class="precio">$25.99</p>
        </div>
        <div class="producto">
            <img src="https://via.placeholder.com/200" alt="Vestido">
            <h2>Vestido Elegante</h2>
            <p>Perfecto para eventos especiales y reuniones.</p>
            <p class="precio">$35.99</p>
        </div>
    </div>
</body>
</html>
